name: Ariba Sync Debug

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Debug SFTP connection
        env:
          AGENCY_SFTP_HOST: ${{ secrets.AGENCY_SFTP_HOST }}
          AGENCY_SFTP_PORT: ${{ secrets.AGENCY_SFTP_PORT }}
          AGENCY_SFTP_USER: ${{ secrets.AGENCY_SFTP_USER }}
          AGENCY_SFTP_PASS: ${{ secrets.AGENCY_SFTP_PASS }}
        run: |
          lftp -d -u "$AGENCY_SFTP_USER","$AGENCY_SFTP_PASS" sftp://$AGENCY_SFTP_HOST:$AGENCY_SFTP_PORT <<EOF
          set sftp:auto-confirm yes
          pwd
          ls
          bye
          EOF
