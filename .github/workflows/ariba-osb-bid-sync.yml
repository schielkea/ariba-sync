name: Ariba OSB Bid Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Download newest CSV from agency SFTP
        env:
          AGENCY_SFTP_HOST: ${{ secrets.AGENCY_SFTP_HOST }}
          AGENCY_SFTP_PORT: ${{ secrets.AGENCY_SFTP_PORT }}
          AGENCY_SFTP_USER: ${{ secrets.AGENCY_SFTP_USER }}
          AGENCY_SFTP_PASS: ${{ secrets.AGENCY_SFTP_PASS }}
        run: |
          mkdir -p work
          cd work

          lftp <<EOF
          set net:timeout 20
          set net:max-retries 1
          set net:reconnect-interval-base 5
          set sftp:auto-confirm yes
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa"
          open -u "$AGENCY_SFTP_USER","$AGENCY_SFTP_PASS" sftp://$AGENCY_SFTP_HOST:$AGENCY_SFTP_PORT
          cd /work
          cls -1 > filelist.txt
          bye
          EOF

          LATEST_FILE=$(grep '^Ariba_Discovery_Events[0-9]\{14\}\.csv$' filelist.txt | sort | tail -n 1)

          if [ -z "$LATEST_FILE" ]; then
            echo "No matching CSV file found"
            exit 1
          fi

          echo "Latest file: $LATEST_FILE"

          lftp <<EOF
          set net:timeout 20
          set net:max-retries 1
          set net:reconnect-interval-base 5
          set sftp:auto-confirm yes
          set sftp:connect-program "ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa"
          open -u "$AGENCY_SFTP_USER","$AGENCY_SFTP_PASS" sftp://$AGENCY_SFTP_HOST:$AGENCY_SFTP_PORT
          cd /work
          get "$LATEST_FILE" -o ariba.csv
          bye
          EOF

      - name: Convert CSV to JSON
        run: |
          python3 - <<'PY'
          import csv, json

          with open('work/ariba.csv', newline='', encoding='utf-8-sig') as f:
              rows = list(csv.DictReader(f))

          rows = [r for r in rows if r.get("Status") == "Published"]

          with open('work/ariba_discovery_current.json', 'w', encoding='utf-8') as f:
              json.dump(rows, f, indent=2)

          print(f"Converted {len(rows)} rows")
          PY

      - name: Upload JSON to WP Engine
        env:
          WPE_SFTP_HOST: ${{ secrets.WPE_SFTP_HOST }}
          WPE_SFTP_PORT: ${{ secrets.WPE_SFTP_PORT }}
          WPE_SFTP_USER: ${{ secrets.WPE_SFTP_USER }}
          WPE_SFTP_PASS: ${{ secrets.WPE_SFTP_PASS }}
          WPE_TARGET_PATH: ${{ secrets.WPE_TARGET_PATH }}
        run: |
          lftp <<EOF
          set net:timeout 20
          set net:max-retries 1
          set net:reconnect-interval-base 5
          set sftp:auto-confirm yes
          open -u "$WPE_SFTP_USER","$WPE_SFTP_PASS" sftp://$WPE_SFTP_HOST:$WPE_SFTP_PORT
          put work/ariba_discovery_current.json -o "$WPE_TARGET_PATH"
          bye
          EOF
